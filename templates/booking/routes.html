{% extends "booking/base.html" %}
{% block content %}
<main class="container py-5">
    <h1>Statewide Routes</h1>
    <div class="route-grid mt-4">
        {% for route in routes %}
        <article class="route-card">
            <div><strong>{{ route.source }} -> {{ route.destination }}</strong><span>{{ route.distance_km }} km</span></div>
            <div class="route-actions">
                <b>INR {{ route.base_fare }}</b>
                {% if user.is_authenticated %}<a class="btn btn-sm btn-outline-primary" href="{% url 'add_favorite_route' route.id %}">Favorite</a>{% endif %}
            </div>
        </article>
        {% endfor %}
    </div>
</main>
{% endblock %}
